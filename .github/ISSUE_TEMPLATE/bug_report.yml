name: Bug report
description: Report a reproducible problem
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please include minimal reproduction steps.
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Describe expected vs actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: reqable-mcp version
      placeholder: "e.g. 0.1.0"
  - type: textarea
    id: logs
    attributes:
      label: Logs / traces
      render: shell
